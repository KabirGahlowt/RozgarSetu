<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RozgarSetu - Select Language</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1754cf",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                        "pink-soft": "hsla(336, 100%, 96%, 1)",
                        "content-light": "#111827",
                        "content-dark": "#f9fafb",
                        "stroke-light": "#e5e7eb",
                        "stroke-dark": "#374151"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
                'FILL' 0,
                'wght' 400,
                'GRAD' 0,
                'opsz' 24
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-content-light dark:text-content-dark">
<div class="flex flex-col min-h-screen">
<header class="w-full px-4 sm:px-8 py-4 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white">work</span>
</div>
<h1 class="text-xl font-bold text-content-light dark:text-content-dark">RozgarSetu</h1>
</div>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-4">
<div class="w-full max-w-2xl text-center space-y-8">
<div class="space-y-2">
<h2 class="text-3xl sm:text-4xl font-bold tracking-tight">Please choose your language</h2>
<p class="text-lg text-content-light/70 dark:text-content-dark/70">Aap apni bhasha chunein</p>
</div>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
<button class="flex flex-col items-center justify-center gap-4 p-6 bg-white dark:bg-background-dark border border-stroke-light dark:border-stroke-dark rounded-xl hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-4xl text-primary">translate</span>
<span class="text-lg font-semibold">English</span>
</button>
<button class="flex flex-col items-center justify-center gap-4 p-6 bg-white dark:bg-background-dark border border-stroke-light dark:border-stroke-dark rounded-xl hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-4xl text-primary">translate</span>
<span class="text-lg font-semibold">हिंदी</span>
</button>
<button class="flex flex-col items-center justify-center gap-4 p-6 bg-white dark:bg-background-dark border border-stroke-light dark:border-stroke-dark rounded-xl hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-4xl text-primary">translate</span>
<span class="text-lg font-semibold">मराठी</span>
</button>
<button class="flex flex-col items-center justify-center gap-4 p-6 bg-white dark:bg-background-dark border border-stroke-light dark:border-stroke-dark rounded-xl hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-4xl text-primary">translate</span>
<span class="text-lg font-semibold">தமிழ்</span>
</button>
<button class="flex flex-col items-center justify-center gap-4 p-6 bg-white dark:bg-background-dark border border-stroke-light dark:border-stroke-dark rounded-xl hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-4xl text-primary">translate</span>
<span class="text-lg font-semibold">বাংলা</span>
</button>
<button class="flex flex-col items-center justify-center gap-4 p-6 bg-pink-soft dark:bg-primary/20 border border-transparent rounded-xl hover:bg-pink-soft/80 dark:hover:bg-primary/30 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span class="material-symbols-outlined text-4xl text-primary">mic</span>
<span class="text-lg font-semibold text-primary">Speak</span>
</button>
</div>
<div class="flex flex-col items-center gap-4 pt-4">
<button class="w-full max-w-xs h-12 px-6 bg-primary text-white rounded-lg text-lg font-semibold flex items-center justify-center gap-2 hover:bg-primary/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background-light dark:focus:ring-offset-background-dark">
<span>Continue</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
</div>

</body></html>
