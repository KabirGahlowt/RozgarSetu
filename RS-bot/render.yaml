# Render Blueprint — set root directory to RS-bot (or this folder) in the dashboard if deploying from a monorepo.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: rozgarsetu-rs-bot
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BACKEND_API_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
